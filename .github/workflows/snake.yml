name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # runs daily at midnight
  workflow_dispatch:       # lets you run it manually too

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: PratikPardhi04
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

---

**Step 3 — Run it manually once**
Go to → **Actions tab** → click **"Generate Snake Animation"** → click **"Run workflow"**

---

**Step 4 — Update your README**

Once it runs, replace the snake URL in your README with:
```
https://raw.githubusercontent.com/PratikPardhi04/PratikPardhi04/output/github-snake-dark.svg
